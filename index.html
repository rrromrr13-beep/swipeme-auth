<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SwipeMe — Confirmation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: #6c47ff;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 { font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    p { font-size: 15px; color: #888; line-height: 1.6; margin-bottom: 24px; }
    .success { color: #22c55e; font-size: 48px; margin-bottom: 16px; }
    .error { color: #ef4444; font-size: 48px; margin-bottom: 16px; }
    .status { font-size: 12px; color: #bbb; margin-top: 16px; }
    .instruction {
      background: #f0eeff;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      font-size: 13px;
      color: #6c47ff;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <rect x="4" y="10" width="16" height="28" rx="8" fill="white" opacity="0.95"/>
        <rect x="28" y="10" width="16" height="28" rx="8" fill="white" opacity="0.5"/>
        <circle cx="24" cy="24" r="6" fill="white"/>
        <text x="24" y="27.5" text-anchor="middle" font-size="5.5" font-weight="700" fill="#6c47ff" font-family="system-ui">VS</text>
      </svg>
    </div>
    <div id="content">
      <h1>Chargement...</h1>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search)
    const hash = window.location.hash ? new URLSearchParams(window.location.hash.substring(1)) : new URLSearchParams()
    const error = params.get('error') || hash.get('error')
    const errorDesc = params.get('error_description') || hash.get('error_description')
    const content = document.getElementById('content')
    if (error) {
      content.innerHTML = `
        <div class="error">✗</div>
        <h1>Lien invalide</h1>
        <p>${decodeURIComponent((errorDesc || 'Ce lien a expiré ou est invalide.').replace(/\+/g, ' '))}</p>
        <div class="instruction">Retournez sur SwipeMe et recommencez l'inscription.</div>
      `
    } else {
      content.innerHTML = `
        <div class="success">✓</div>
        <h1>Email confirmé !</h1>
        <p>Votre compte SwipeMe est activé avec succès.</p>
        <div class="instruction">
          📱 Ouvrez l'application SwipeMe sur votre téléphone et connectez-vous avec votre email et mot de passe.
        </div>
        <p class="status">Vous pouvez fermer cette page.</p>
      `
    }
  </script>
</body>
</html>
